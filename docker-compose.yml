version: '3.8'

services:
  goclawde:
    build:
      context: .
      dockerfile: Dockerfile
    image: myrai:latest
    container_name: goclawde
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database (PostgreSQL)
      - DATABASE_URL=postgres://myrai:myrai_secret@postgres:5432/myrai?sslmode=disable
      
      # LLM Provider Configuration (REQUIRED - set at least one)
      - MYRAI_LLM_DEFAULT_PROVIDER=${MYRAI_LLM_DEFAULT_PROVIDER:-kimi}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - MYRAI_LLM_PROVIDERS_KIMI_MODEL=${MYRAI_LLM_PROVIDERS_KIMI_MODEL:-kimi-k2.5}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      
      # Channels (optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      
      # Skills (optional)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - DAUN_API_KEY=${DAUN_API_KEY:-}
      
      # Vision Skill
      - MYRAI_SKILLS_VISION_ENABLED=${MYRAI_SKILLS_VISION_ENABLED:-true}
      - MYRAI_SKILLS_VISION_VISION_MODEL=${MYRAI_SKILLS_VISION_VISION_MODEL:-kimi-k2.5}
      
      # Threads Skill
      - MYRAI_SKILLS_THREADS_ENABLED=${MYRAI_SKILLS_THREADS_ENABLED:-true}
      - MYRAI_SKILLS_THREADS_ACCESS_TOKEN=${MYRAI_SKILLS_THREADS_ACCESS_TOKEN:-}
      
      # Search Skill
      - MYRAI_SKILLS_SEARCH_API_KEY=${MYRAI_SKILLS_SEARCH_API_KEY:-}
      - MYRAI_SKILLS_SEARCH_PROVIDER=${MYRAI_SKILLS_SEARCH_PROVIDER:-duckduckgo}
      
      # Browser Skill
      - MYRAI_SKILLS_BROWSER_ENABLED=${MYRAI_SKILLS_BROWSER_ENABLED:-true}
      - MYRAI_SKILLS_BROWSER_HEADLESS=${MYRAI_SKILLS_BROWSER_HEADLESS:-true}
      
      # Security
      - MYRAI_JWT_SECRET=${MYRAI_JWT_SECRET:-}
      - MYRAI_ADMIN_PASSWORD=${MYRAI_ADMIN_PASSWORD:-}
      - MYRAI_GATEWAY_TOKEN=${MYRAI_GATEWAY_TOKEN:-}
      
      # Server config
      - MYRAI_SERVER_PORT=8080
      - MYRAI_SERVER_ADDRESS=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - myrai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    container_name: myrai-postgres
    environment:
      POSTGRES_USER: myrai
      POSTGRES_PASSWORD: myrai_secret
      POSTGRES_DB: myrai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - myrai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myrai -d myrai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management (dev profile)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: myrai-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@myrai.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - myrai-network
    restart: unless-stopped
    profiles:
      - dev

volumes:
  postgres_data:

networks:
  myrai-network:
    driver: bridge