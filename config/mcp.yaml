# MCP Server Configuration
# This file configures Model Context Protocol (MCP) servers for Myrai
# MCP is an open protocol for AI assistants to communicate with external tools
#
# NOTE: MCP is currently disabled. The application uses internal Go skills instead:
#   - browser skill: Local Chrome/Chromium automation (free)
#   - search skill: DuckDuckGo provider (free, no API key)
#
# To enable MCP servers, set enabled: true below and configure desired servers.

mcp:
  # Global MCP settings
  enabled: false
  auto_start: false
  health_check_interval: 30  # seconds
  
  # MCP Server Definitions (all disabled by default)
  # These servers provide external tools via the MCP protocol.
  # Uncomment and enable specific servers as needed.
