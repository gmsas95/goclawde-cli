# Myrai 2.0 Skills Configuration
# This file configures skill sources and skill-specific settings
#
# NOTE: MCP servers have been moved to mcp.yaml and are disabled by default.
# The application now uses internal Go skills for better performance:
#   - browser skill: Local Chrome/Chromium automation (free)
#   - search skill: DuckDuckGo provider by default (free, no API key)

# Skill search paths
skill_paths:
  - ./skills
  - ~/.myrai/skills
  - /usr/share/myrai/skills

# Sandbox configuration
sandbox_enabled: true

# LLM Provider for inline skills
llm_provider: default

# Scheduler configuration
enable_scheduler: true

# Circuit breaker settings
circuit_breaker:
  max_requests: 100
  interval: 30s
  timeout: 60s
  consecutive_failures_threshold: 5

# Skill-specific configuration
skills:
  # Example skill configuration
  example-skill:
    enabled: true
    config:
      api_key: ${EXAMPLE_API_KEY}
      endpoint: https://api.example.com

# Dependency resolution
dependency_resolution:
  auto_resolve: true
  allow_circular: false
  max_depth: 10

# MCP Server configurations (disabled by default)
# For MCP server configuration, see mcp.yaml
# mcp_servers: []
